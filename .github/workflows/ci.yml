# The COMMON Swift legs (lint/gate + build & test on macOS + Linux) route through the shared
# reusable workflow. Everything package-UNIQUE fans out alongside it: the Foundation-free-core Linux
# portability build, the cross-platform compile matrix, the ordo-one benchmark suite, the libFuzzer
# pass, the gated swift-crypto SRI target, the DocC link check, and the hand-written JS client
# runtime (bun unit tests + Playwright e2e). AD* sibling dependencies resolve from github.com/g-cqd
# (the manifest default when <DEP>_PATH is unset), so the resolution-dependent legs gate on
# AD_SWIFT_SIBLINGS_PUBLISHED.
#
# HUMAN REVIEW (see report): ADHTML's macro target needs `swift build/test --build-system native`
# (the classic build system) to avoid the swiftbuild macro/test-link bug (ADR-0008). The reusable
# workflow runs plain `swift build`/`swift test` (no `--build-system` input), so its macOS/Linux test
# legs may hit that bug on the current toolchain. The package-unique jobs below keep `--build-system
# native`. If the reusable legs fail on the macro link, either add a `build-system` input upstream or
# fall back to a bespoke native build-test job for ADHTML.
name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["**/*.md", "LICENSE", ".gitignore", "docs/**"]
  pull_request:
    paths-ignore: ["**/*.md", "LICENSE", ".gitignore", "docs/**"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  quality:
    # Full-adopt of the reusable workflow for the COMMON gate + build/test (macOS + Linux). ADHTML
    # depends on the first-party siblings ADFoundation and ADJSON (resolved from branch: main —
    # Package.swift lines 45–46, in the always-on dependency array, NOT dev-gated), so the
    # resolution-dependent jobs stay gated on AD_SWIFT_SIBLINGS_PUBLISHED; the file-based gates
    # (format/metrics/drift) always run. Sanitizers/docs are NOT enabled: ADHTML had no sanitizer
    # job, and its DocC leg is a stricter `--warnings-as-errors` link check (the `docs-check` job
    # below) with no Pages deploy.
    uses: g-cqd/ADBuildTools/.github/workflows/swift-quality.yml@v1
    with:
      dev-env-var: ADHTML_DEV
      enable-sanitizers: true
      sanitizers: "address thread"
      enable-coverage: true
      requires-published-siblings: true

  linux:
    name: Build & test (Linux, Foundation-free core)
    needs: quality
    # ADHTMLCore is Foundation-free; building it in isolation on Linux guards portability — a check
    # the reusable's whole-package Linux leg doesn't make. Advisory while the tools-version tracks a
    # toolchain only the nightly container ships. Uses `--build-system native` (ADR-0008 macro bug).
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Dated nightly pins the toolchain for reproducible CI; bump deliberately like a dependency (#14).
    container: swiftlang/swift:nightly-6.4-2026-06-18-jammy
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Show toolchain
        run: swift --version
      - name: Build Foundation-free core
        run: swift build --build-system native --target ADHTMLCore
      - name: Build & test full package
        run: swift test --build-system native

  platforms:
    name: Build (${{ matrix.platform }})
    needs: quality
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        platform: [iOS, tvOS, watchOS, visionOS]
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Build for ${{ matrix.platform }}
        run: >-
          xcodebuild build
          -scheme ADHTML
          -destination "generic/platform=${{ matrix.platform }}"
          -skipMacroValidation
          -skipPackagePluginValidation

  benchmarks:
    name: Benchmark (macOS, release)
    needs: quality
    # ordo-one suite, on main / dispatch only (noisy on shared runners); advisory.
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Install jemalloc (package-benchmark malloc metrics)
        run: brew install jemalloc
      - name: Run the benchmark suite
        env:
          ADHTML_DEV: "1"
        run: |
          set -o pipefail
          swift package --build-system native --allow-writing-to-package-directory benchmark --format markdown | tee bench.md
      - name: Regression check vs committed baseline
        # Advisory (the job is continue-on-error) and guarded: a no-op until a baseline is captured on this
        # runner class (hosted timings miscalibrate against a dev machine — capture via
        # `swift package benchmark baseline update main` on macos-26, then commit .benchmarkBaselines/main/).
        # Once a baseline exists, `baseline check` flags a regression past the suite's thresholds; promote to
        # a hard gate (drop continue-on-error) when the runner proves stable — mirrors the ADJSON gate.
        if: always()
        env:
          ADHTML_DEV: "1"
        run: |
          if ls -d .benchmarkBaselines/*/main >/dev/null 2>&1; then
            swift package --build-system native --allow-writing-to-package-directory benchmark baseline check main
          else
            echo "No committed baseline yet — capture one on this runner class, then commit .benchmarkBaselines/main/."
          fi
      - name: Publish results to the job summary
        if: always()
        run: cat bench.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true

  fuzz:
    name: Fuzz (libFuzzer, Linux)
    needs: quality
    # `-sanitize=fuzzer` is a Linux capability of the toolchain (the Darwin SDK rejects it). Time-boxed,
    # advisory (nightly container). A crash uploads its reproducer; commit it as a regression test.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    # Dated nightly pins the toolchain for reproducible CI; bump deliberately like a dependency (#14).
    container: swiftlang/swift:nightly-6.4-2026-06-18-jammy
    continue-on-error: true
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Build fuzz target
        env:
          ADHTML_FUZZ: "1"
        run: swift build --build-system native --product ADHTMLFuzz
      - name: Run fuzzer (time-boxed)
        env:
          ADHTML_FUZZ: "1"
        run: |
          BIN="$(swift build --build-system native --product ADHTMLFuzz --show-bin-path)/ADHTMLFuzz"
          mkdir -p corpus
          printf '<a href="javascript:alert(1)">x</a>' > corpus/seed.html
          "$BIN" corpus -max_total_time=180 -timeout=10 -rss_limit_mb=2048 -artifact_prefix=crash-
      - name: Upload crash reproducers
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: crash-*
          if-no-files-found: ignore

  sri:
    name: SRI (gated, swift-crypto)
    needs: quality
    # The `ADHTML_SRI` target pulls swift-crypto, so it is gated out of the default build; this job
    # builds + runs its tests (canonical SHA-256 vectors) so the gated code never rots.
    runs-on: macos-26
    env:
      ADHTML_SRI: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Build & test the SRI target
        run: swift test --build-system native --filter ADHTMLSRITests

  docs-check:
    name: Build docs (link check)
    needs: quality
    runs-on: macos-26
    env:
      ADHTML_DEV: "1"
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Build DocC (warnings as errors)
        run: |
          swift package --build-system native --allow-writing-to-directory "$PWD/_docs_check" \
            generate-documentation \
            --enable-experimental-combined-documentation \
            --target ADHTMLCore --target ADHTML \
            --disable-indexing --warnings-as-errors \
            --output-path "$PWD/_docs_check"

  sanitizers:
    name: Sanitizers (${{ matrix.name }})
    needs: quality
    # ASan+UBSan and TSan over the engine's unsafe surface (Escape/**, Render/**) and the Mutex-backed
    # concurrency layer (CellArena, AsyncByteSink). Slow (TSan ~5-15×), so main / dispatch only, advisory
    # for now — promote to a hard gate once stable. `--build-system native` (the macro/test-link caveat,
    # ADR-0008). The two passes are mutually exclusive (ASan and TSan can't combine).
    if: github.event_name != 'pull_request'
    runs-on: macos-26
    continue-on-error: true
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: thread, flags: "--sanitize=thread" }
          - { name: address, flags: "--sanitize=address" }
    steps:
      - uses: actions/checkout@v6
      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"
      - name: Test under the ${{ matrix.name }} sanitizer
        run: swift test --build-system native ${{ matrix.flags }}

  runtime:
    name: Client runtime (bun)
    # The hand-written JS hydration runtime: strict typecheck, unit-test the DOM-free core + the DOM
    # layer (delegated events, bindings, visible, morph) under happy-dom, build + gate its gzip size
    # (<= 4 KiB, ADR-0006 — build.js enforces 4 * 1024), and verify the committed artifact is in sync.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
        working-directory: ClientRuntime
      - name: Typecheck (tsc, strict)
        run: bun run typecheck
        working-directory: ClientRuntime
      - name: Test (DOM-free core + happy-dom DOM layer)
        run: bun run test
        working-directory: ClientRuntime
      - name: Build + gzip size gate
        run: bun run build.js
        working-directory: ClientRuntime
      - name: Verify committed runtime artifact is in sync
        run: git diff --exit-code -- adh-runtime.min.js
        working-directory: ClientRuntime

  e2e:
    name: Client runtime e2e (Playwright, chromium)
    # Real-browser smoke (chromium) over a fixture server — validates real-layout IntersectionObserver
    # (the `visible` directive) and real event timing, the gaps happy-dom can't cover. Heavier (browser
    # download), so it's a separate job; the happy-dom `runtime` job stays the fast gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile
        working-directory: ClientRuntime
      - name: Install Chromium
        run: bunx playwright install --with-deps chromium
        working-directory: ClientRuntime
      - name: Build the runtime (fixture serves it)
        run: bun run build.js
        working-directory: ClientRuntime
      - name: Run Playwright e2e
        run: bun run e2e
        working-directory: ClientRuntime
